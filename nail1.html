<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad 丝滑视频字幕学习器</title>
    <style>
        /* 保持你原本的 CSS 样式布局即可，这里提供基础结构样式，可根据需要替换 */
        body { margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f7; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .container { display: flex; flex: 1; gap: 20px; min-height: 0; }
        .video-section { flex: 1.2; display: flex; flex-direction: column; background: #000; border-radius: 12px; overflow: hidden; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .subtitle-section { flex: 0.8; display: flex; flex-direction: column; background: #fff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 15px; box-sizing: border-box; }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .search-bar { width: 100%; padding: 8px 12px; border: 1px solid #d2d2d7; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; font-size: 14px; }
        .subtitle-list { flex: 1; overflow-y: auto; border: 1px solid #e5e5ea; border-radius: 8px; padding: 5px; }
        .subtitle-item { padding: 10px; border-bottom: 1px solid #f2f2f7; cursor: pointer; display: flex; gap: 10px; border-radius: 6px; transition: background 0.2s; }
        .subtitle-item:hover { background: #f5f5f7; }
        .subtitle-item.active { background: #e8f2ff; color: #0066cc; font-weight: bold; }
        .time-badge { color: #86868b; font-size: 12px; white-space: nowrap; margin-top: 2px; }
        .hidden-by-search { display: none !important; }
        .placeholder { color: #fff; text-align: center; font-size: 16px; }
        button { padding: 8px 16px; border: none; background: #0071e3; color: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; }
        button:hover { background: #0077ed; }
        .btn-danger { background: #ff3b30; }
        .btn-danger:hover { background: #ff453a; }
    </style>
</head>
<body>

    <div class="controls">
        <button id="btnLoadVideo">导入新视频</button>
        <button id="btnLoadSubtitle">导入新字幕</button>
        <button id="btnClearSubtitle" class="btn-danger">清空字幕</button>
        <input type="file" id="videoFileInput" accept="video/*" style="display: none;">
        <input type="file" id="subtitleFileInput" accept=".srt,.vtt,.txt" style="display: none;">
    </div>

    <div class="container">
        <div class="video-section">
            <div id="videoPlaceholder" class="placeholder">请先导入剪映规范化后的视频</div>
            <video id="localVideo" controls style="display: none;"></video>
        </div>
        
        <div class="subtitle-section">
            <input type="text" id="subtitleSearch" class="search-bar" placeholder="搜索字幕关键字...">
            <div id="subtitleList" class="subtitle-list">
                <div id="emptySubtitleState" style="text-align: center; color: #86868b; padding-top: 40px;">暂无字幕数据</div>
            </div>
        </div>
    </div>

    <script>
        let subtitles = [];
        let currentActiveIndex = -1;
        let lastActiveIndex = -1; 
        let searchQuery = '';
        let currentVideoName = ''; 
        let isWaitingForPad = false; // iPad 缓冲防御盾

        // 工具函数：格式化时间
        function formatTimeShort(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 解析时间戳
        function parseTimecode(tc) {
            const match = tc.match(/(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/);
            if (!match) return null;
            return parseInt(match[1]) * 3600 + parseInt(match[2]) * 60 + parseInt(match[3]) + parseInt(match[4]) / 1000;
        }

        // 解析字幕文件（SRT / VTT）
        function parseSubtitles(content) {
            const lines = content.split(/\r?\n/);
            const result = [];
            let i = 0;
            const isVTT = lines[0] && lines[0].trim().toUpperCase() === 'WEBVTT';
            if (isVTT) i = 1;
            while (i < lines.length) {
                while (i < lines.length && lines[i].trim() === '') i++;
                if (i >= lines.length) break;
                const line1 = lines[i].trim();
                if (/^\d+$/.test(line1) && !isVTT) { i++; if (i >= lines.length) break; }
                const timeLine = lines[i].trim();
                const timeMatch = timeLine.match(/(\d{2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})/);
                if (!timeMatch) { i++; continue; }
                const start = parseTimecode(timeMatch[1]);
                const end = parseTimecode(timeMatch[2]);
                if (start === null || end === null) { i++; continue; }
                i++;
                const textLines = [];
                while (i < lines.length && lines[i].trim() !== '') { textLines.push(lines[i].trim()); i++; }
                const text = textLines.join(' ').trim();
                if (text) result.push({ start, end, text });
            }
            result.sort((a, b) => a.start - b.start);
            return result;
        }

        function loadSubtitles(arr) {
            subtitles = arr.map((item, idx) => ({ id: idx, start: item.start, end: item.end, text: item.text, element: null }));
            lastActiveIndex = -1; 
            currentActiveIndex = -1;
            isWaitingForPad = false;
            renderSubtitleList();
            updateSubtitleHighlight();
        }

        function renderSubtitleList() {
            const subtitleList = document.getElementById('subtitleList');
            subtitleList.innerHTML = '';
            subtitles.forEach((sub, idx) => {
                const el = document.createElement('div');
                el.className = 'subtitle-item';
                el.dataset.index = idx;
                el.innerHTML = `<span class="time-badge">${formatTimeShort(sub.start)}</span><span class="text">${escapeHtml(sub.text)}</span>`;
                el.addEventListener('click', () => seekToSubtitle(idx));
                subtitleList.appendChild(el);
                sub.element = el;
            });
            document.getElementById('emptySubtitleState').style.display = subtitles.length ? 'none' : 'flex';
            applySearchFilter();
        }

        function applySearchFilter() {
            const q = searchQuery.toLowerCase().trim();
            subtitles.forEach(sub => {
                if (!sub.element) return;
                sub.element.classList.toggle('hidden-by-search', q && !sub.text.toLowerCase().includes(q));
            });
        }

        function updateSubtitleHighlight() {
            if (lastActiveIndex !== -1 && subtitles[lastActiveIndex] && subtitles[lastActiveIndex].element) {
                subtitles[lastActiveIndex].element.classList.remove('active');
            }
            if (currentActiveIndex !== -1 && subtitles[currentActiveIndex] && subtitles[currentActiveIndex].element) {
                const activeEl = subtitles[currentActiveIndex].element;
                activeEl.classList.add('active');
                activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
            lastActiveIndex = currentActiveIndex;
        }

        // iPad 丝滑跳转优化核心（刹车缓冲机制）
        function seekToSubtitle(index) {
            if (index < 0 || index >= subtitles.length) return;
            
            const video = document.getElementById('localVideo');
            const seekTime = Math.max(0, subtitles[index].start - 0.1);

            currentActiveIndex = index;
            updateSubtitleHighlight();

            // 跳转前先强制刹车，大幅减少大文件硬解缓冲时的多余计算
            if (!video.paused) {
                video.pause();
            }

            isWaitingForPad = true; 
            video.currentTime = seekTime;

            // 监听 iPad 底层就绪事件
            const onReadyToPlay = () => {
                setTimeout(() => {
                    video.play().catch(() => {});
                    isWaitingForPad = false;
                }, 80);
                video.removeEventListener('seeked', onReadyToPlay);
                video.removeEventListener('canplay', onReadyToPlay);
            };

            video.addEventListener('seeked', onReadyToPlay);
            video.addEventListener('canplay', onReadyToPlay);
        }

        // 加载视频与恢复历史进度
        function loadLocalVideo(file) {
            const video = document.getElementById('localVideo');
            const placeholder = document.getElementById('videoPlaceholder');
            
            // 兼容性处理：如果 iPad 系统隐藏了文件名，则使用默认别名
            currentVideoName = (file && file.name) ? file.name : 'ipad_standard_video'; 
            
            video.src = URL.createObjectURL(file);
            video.style.display = 'block';
            placeholder.style.display = 'none';

            // 读取历史进度
            const savedTime = localStorage.getItem('nail_history_' + currentVideoName);
            if (savedTime) {
                const targetTime = parseFloat(savedTime);
                const onLoadedMetadata = () => {
                    video.currentTime = targetTime;
                    video.removeEventListener('loadedmetadata', onLoadedMetadata);
                };
                video.addEventListener('loadedmetadata', onLoadedMetadata);
            }
        }

        // 事件绑定
        document.getElementById('btnLoadVideo').addEventListener('click', () => document.getElementById('videoFileInput').click());
        document.getElementById('videoFileInput').addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) loadLocalVideo(e.target.files[0]);
            e.target.value = '';
        });

        document.getElementById('btnLoadSubtitle').addEventListener('click', () => document.getElementById('subtitleFileInput').click());
        document.getElementById('subtitleFileInput').addEventListener('change', (e) => {
            if (!e.target.files || !e.target.files[0]) return;
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const parsed = parseSubtitles(ev.target.result);
                if (parsed.length === 0) return alert('未解析到有效字幕');
                loadSubtitles(parsed);
            };
            reader.readAsText(file, 'UTF-8');
            e.target.value = '';
        });

        document.getElementById('btnClearSubtitle').addEventListener('click', () => {
            subtitles = [];
            currentActiveIndex = -1;
            lastActiveIndex = -1;
            renderSubtitleList();
            updateSubtitleHighlight();
        });

        document.getElementById('subtitleSearch').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            applySearchFilter();
        });

        // 自动跟随进度与历史进度记忆（1秒节流防抖）
        let lastSavedTime = 0;
        document.getElementById('localVideo').addEventListener('timeupdate', () => {
            if (isWaitingForPad) return; // 正在缓冲时禁止干扰

            const video = document.getElementById('localVideo');
            const ct = video.currentTime;

            // 每隔 1 秒将当前进度安全地存入系统本地
            if (currentVideoName && Math.abs(ct - lastSavedTime) > 1) {
                localStorage.setItem('nail_history_' + currentVideoName, ct.toString());
                lastSavedTime = ct;
            }

            // 字幕高亮跟随
            for (let i = subtitles.length - 1; i >= 0; i--) {
                if (ct >= subtitles[i].start && ct <= subtitles[i].end) {
                    if (currentActiveIndex !== i) { 
                        currentActiveIndex = i; 
                        updateSubtitleHighlight(); 
                    }
                    return;
                }
            }
        });

        // 快捷键支持（空格播放/暂停，左右键快进退）
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            const video = document.getElementById('localVideo');
            if (e.code === 'Space') { e.preventDefault(); video.paused ? video.play() : video.pause(); }
            if (e.code === 'ArrowRight') { e.preventDefault(); video.currentTime = Math.min(video.duration, video.currentTime + 5); }
            if (e.code === 'ArrowLeft') { e.preventDefault(); video.currentTime = Math.max(0, video.currentTime - 5); }
        });
    </script>
</body>
</html>
