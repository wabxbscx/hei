<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>奶龙大学习</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 拖拽高亮 */
        body.drag-over {
            outline: 3px dashed #0071e3;
            outline-offset: -8px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }
        .upload-wrapper {
            position: relative;
            display: inline-block;
            overflow: hidden;
        }
        .visible-btn {
            padding: 8px 16px;
            border: none;
            background: #0071e3;
            color: #fff;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            display: inline-block;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
        }
        .btn-danger {
            background: #ff3b30;
            pointer-events: auto;
            cursor: pointer;
        }
        .btn-danger:active {
            background: #ff453a;
        }
        .hidden-file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: 100px;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }
        .controls select, .controls input[type="range"] {
            padding: 6px 8px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 13px;
            background: #fff;
            height: 34px;
        }
        .icon-btn {
            background: #fff;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 13px;
            cursor: pointer;
            background: #f9f9fb;
            white-space: nowrap;
            color: #1d1d1f;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .icon-btn:active {
            background: #e5e5ea;
        }
        .icon-btn.active-loop {
            background: #0071e3;
            color: #fff;
            border-color: #0071e3;
        }
        .offset-indicator {
            font-size: 12px;
            color: #1d1d1f;
            background: #fff;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            padding: 6px 8px;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
        }

        .container {
            display: flex;
            gap: 16px;
            min-height: 0;
            flex: 1;
            height: calc(100% - 70px);
        }

        .video-section {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            display: none;
        }
        video::-webkit-media-controls {
            display: none !important;
        }
        .placeholder {
            width: 100%;
            height: 100%;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            min-height: 150px;
            background: #000;
            border-radius: 12px;
        }

        .video-controls-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(28, 28, 30, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 10px 16px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 20;
            user-select: none;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .play-pause-btn {
            background: none;
            border: none;
            padding: 0;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            outline: none;
        }
        .play-pause-btn svg {
            width: 18px;
            height: 18px;
            fill: #ffffff;
            transition: transform 0.1s ease;
        }
        .play-pause-btn:active svg {
            transform: scale(0.85);
        }
        .progress-wrapper {
            flex: 1;
            height: 34px;
            display: flex;
            align-items: center;
            cursor: pointer;
            touch-action: none;
            position: relative;
        }
        .custom-progress-container {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.25);
            position: relative;
            border-radius: 3px;
            pointer-events: none;
        }
        .custom-progress-bar {
            height: 100%;
            width: 0%;
            background: #0071e3;
            border-radius: 3px;
            position: relative;
            will-change: width;
        }
        .custom-progress-bar::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
            transition: transform 0.1s ease;
        }
        .progress-wrapper:active .custom-progress-bar::after {
            transform: translateY(-50%) scale(1.2);
        }
        .time-display {
            color: #aeaeb2;
            font-size: 13px;
            font-family: -apple-system-font, Menlo, Monaco, monospace;
            white-space: nowrap;
            min-width: 90px;
            text-align: right;
        }

        .subtitle-section {
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 12px;
            position: relative;
        }
        .search-bar {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            flex-shrink: 0;
        }
        .subtitle-list {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            padding: 5px;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }
        .subtitle-item {
            padding: 10px;
            border-bottom: 1px solid #f2f2f7;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .subtitle-item:hover {
            background: #f5f5f7;
        }
        .subtitle-item.active {
            background: #e8f2ff;
            color: #0066cc;
            font-weight: bold;
        }
        .time-badge {
            color: #86868b;
            font-size: 11px;
            white-space: nowrap;
            align-self: flex-start;
        }
        .text {
            font-size: 13px;
            line-height: 1.4;
            word-break: break-word;
        }
        .hidden-by-search {
            display: none !important;
        }
        .empty-state {
            text-align: center;
            color: #86868b;
            padding-top: 40px;
            font-size: 14px;
        }

        /* 响应式 */
        @media (orientation: landscape) {
            .container { flex-direction: row; }
            .video-section { flex: 3; height: 100%; aspect-ratio: auto !important; }
            .subtitle-section { flex: 1; height: 100%; min-width: 280px; }
        }
        @media (orientation: portrait) {
            .container { flex-direction: column; }
            .video-section { width: 100%; flex-shrink: 0; }
            .subtitle-section { flex: 1; min-height: 0; }
        }
    </style>
</head>
<body>

<div class="controls">
    <div class="upload-wrapper">
        <div class="visible-btn">导入视频</div>
        <input type="file" id="videoFileInput" accept="video/*" class="hidden-file-input">
    </div>
    <div class="upload-wrapper">
        <div class="visible-btn">导入字幕</div>
        <input type="file" id="subtitleFileInput" accept=".srt,.vtt,.txt" class="hidden-file-input">
    </div>
    <select id="encodingSelect">
        <option value="utf-8" selected>UTF-8</option>
        <option value="gbk">GBK</option>
        <option value="big5">Big5</option>
    </select>
    <button id="btnClearSubtitle" class="visible-btn btn-danger">清空字幕</button>

    <span style="width:8px;"></span>

    <select id="speedSelect">
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
    </select>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" style="width:80px;">
    <button id="fullscreenBtn" class="icon-btn">⛶ 全屏</button>
    <button id="abLoopBtn" class="icon-btn">🔄 AB循环</button>
    <button id="subOffsetMinus" class="icon-btn">−0.1s</button>
    <button id="subOffsetPlus" class="icon-btn">+0.1s</button>
    <span id="offsetValue" class="offset-indicator">偏移: 0.0s</span>
    <button id="fontSizeMinus" class="icon-btn">A−</button>
    <button id="fontSizePlus" class="icon-btn">A+</button>
</div>

<div class="container">
    <div class="video-section">
        <div id="videoPlaceholder" class="placeholder">请导入视频（也可拖拽文件到页面）</div>
        <video id="localVideo" playsinline webkit-playsinline></video>
        <div id="videoControlsBar" class="video-controls-bar">
            <button id="playPauseBtn" class="play-pause-btn">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <div id="progressWrapper" class="progress-wrapper">
                <div id="progressContainer" class="custom-progress-container">
                    <div id="progressBar" class="custom-progress-bar"></div>
                </div>
            </div>
            <div id="timeDisplay" class="time-display">00:00 / 00:00</div>
        </div>
    </div>

    <div class="subtitle-section" id="subtitlePanel">
        <input type="text" id="subtitleSearch" class="search-bar" placeholder="搜索字幕，按回车跳转...">
        <div id="subtitleList" class="subtitle-list"></div>
        <div id="emptySubtitleState" class="empty-state">暂无字幕</div>
        <div id="noMatchState" class="empty-state" style="display:none;">无匹配结果</div>
    </div>
</div>

<script>
    (function() {
        const video = document.getElementById('localVideo');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');
        const progressWrapper = document.getElementById('progressWrapper');
        const subtitleList = document.getElementById('subtitleList');
        const emptyState = document.getElementById('emptySubtitleState');
        const noMatchState = document.getElementById('noMatchState');
        const searchInput = document.getElementById('subtitleSearch');
        const encodingSelect = document.getElementById('encodingSelect');
        const speedSelect = document.getElementById('speedSelect');
        const volumeSlider = document.getElementById('volumeSlider');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const abLoopBtn = document.getElementById('abLoopBtn');
        const subOffsetMinus = document.getElementById('subOffsetMinus');
        const subOffsetPlus = document.getElementById('subOffsetPlus');
        const offsetValue = document.getElementById('offsetValue');
        const fontSizeMinus = document.getElementById('fontSizeMinus');
        const fontSizePlus = document.getElementById('fontSizePlus');
        const subtitlePanel = document.getElementById('subtitlePanel');

        let subtitles = [];
        let currentActiveIndex = -1;
        let lastActiveIndex = -1;
        let currentVideoName = '';
        let isDragging = false;
        let subtitleOffset = 0;
        let abLoopActive = false;
        let loopStart = null;
        let loopEnd = null;
        let lastSaveTime = 0;
        let currentFontSize = 13;

        // 安全存储
        function safeSetItem(key, value) {
            try { localStorage.setItem(key, value); } catch(e) {}
        }
        function safeGetItem(key) {
            try { return localStorage.getItem(key); } catch(e) { return null; }
        }

        function formatTimeDisplay(seconds) {
            if (isNaN(seconds)) return '00:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return h > 0 ?
                `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` :
                `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function updatePlayPauseUI() {
            const paused = video.paused;
            playIcon.style.display = paused ? 'block' : 'none';
            pauseIcon.style.display = paused ? 'none' : 'block';
        }

        function updateOffsetDisplay() {
            offsetValue.textContent = `偏移: ${subtitleOffset.toFixed(1)}s`;
            if (subtitleOffset !== 0) {
                offsetValue.style.color = '#0071e3';
                offsetValue.style.fontWeight = 'bold';
            } else {
                offsetValue.style.color = '#1d1d1f';
                offsetValue.style.fontWeight = 'normal';
            }
        }

        function computeTimeFromX(clientX) {
            if (!video.duration) return 0;
            const rect = progressWrapper.getBoundingClientRect();
            let ratio = (clientX - rect.left) / rect.width;
            ratio = Math.max(0, Math.min(1, ratio));
            return ratio * video.duration;
        }

        function renderUIProgress(targetTime) {
            const dur = video.duration || 0;
            if (dur <= 0) return;
            progressBar.style.width = (targetTime / dur) * 100 + '%';
            timeDisplay.textContent = `${formatTimeDisplay(targetTime)} / ${formatTimeDisplay(dur)}`;
        }

        function handlePointerDown(e) {
            if (!video.duration) return;
            isDragging = true;
            progressWrapper.setPointerCapture(e.pointerId);
            renderUIProgress(computeTimeFromX(e.clientX));
        }
        function handlePointerMove(e) {
            if (!isDragging) return;
            renderUIProgress(computeTimeFromX(e.clientX));
        }
        function handlePointerUp(e) {
            if (!isDragging) return;
            isDragging = false;
            progressWrapper.releasePointerCapture(e.pointerId);
            const targetTime = computeTimeFromX(e.clientX);
            if (!isNaN(targetTime)) video.currentTime = targetTime;
        }

        progressWrapper.addEventListener('pointerdown', handlePointerDown);
        progressWrapper.addEventListener('pointermove', handlePointerMove);
        progressWrapper.addEventListener('pointerup', handlePointerUp);
        progressWrapper.addEventListener('pointercancel', handlePointerUp);

        playPauseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            video.paused ? video.play().catch(()=>{}) : video.pause();
        });
        video.addEventListener('play', updatePlayPauseUI);
        video.addEventListener('pause', updatePlayPauseUI);
        video.addEventListener('click', () => {
            video.paused ? video.play().catch(()=>{}) : video.pause();
        });

        video.addEventListener('timeupdate', () => {
            const ct = video.currentTime;
            if (!isDragging) renderUIProgress(ct);

            if (currentVideoName && video.duration > 0) {
                const now = Date.now();
                if (now - lastSaveTime > 1000 || video.paused) {
                    safeSetItem('nail_history_' + currentVideoName, ct.toString());
                    lastSaveTime = now;
                }
            }

            if (abLoopActive && loopEnd !== null && ct >= loopEnd) {
                video.currentTime = loopStart ?? 0;
            }

            const adjustedTime = ct - subtitleOffset;
            let found = -1;
            for (let i = subtitles.length-1; i >= 0; i--) {
                if (adjustedTime >= subtitles[i].start && adjustedTime <= subtitles[i].end) {
                    found = i; break;
                }
            }
            if (found !== currentActiveIndex) {
                currentActiveIndex = found;
                updateSubtitleHighlight();
            }
        });

        function updateSubtitleHighlight() {
            if (lastActiveIndex !== -1 && subtitles[lastActiveIndex]?.element)
                subtitles[lastActiveIndex].element.classList.remove('active');
            if (currentActiveIndex !== -1 && subtitles[currentActiveIndex]?.element) {
                const el = subtitles[currentActiveIndex].element;
                el.classList.add('active');
                subtitleList.scrollTo({
                    top: el.offsetTop - subtitleList.clientHeight/2 + el.clientHeight/2,
                    behavior: 'smooth'
                });
            }
            lastActiveIndex = currentActiveIndex;
        }

        function seekToSubtitle(index) {
            if (index < 0 || index >= subtitles.length) return;
            const seekTime = Math.max(0, subtitles[index].start + subtitleOffset);
            currentActiveIndex = index;
            updateSubtitleHighlight();
            video.currentTime = seekTime;
            if (video.paused) video.play().catch(()=>{});
        }

        function parseTimecode(tc) {
            const m = tc.match(/(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/);
            if (!m) return null;
            return parseInt(m[1])*3600 + parseInt(m[2])*60 + parseInt(m[3]) + parseInt(m[4])/1000;
        }

        function parseSubtitles(content) {
            const lines = content.split(/\r?\n/);
            const result = [];
            let i = 0;
            const isVTT = lines[0] && lines[0].trim().toUpperCase()==='WEBVTT';
            if (isVTT) i=1;
            while (i < lines.length) {
                while (i<lines.length && lines[i].trim()==='') i++;
                if (i>=lines.length) break;
                if (/^\d+$/.test(lines[i].trim()) && !isVTT) i++;
                const timeLine = lines[i].trim();
                const tm = timeLine.match(/(\d{2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})/);
                if (!tm) { i++; continue; }
                const start = parseTimecode(tm[1]);
                const end = parseTimecode(tm[2]);
                if (start===null||end===null) { i++; continue; }
                i++;
                const textLines=[];
                while (i<lines.length && lines[i].trim()!=='') { textLines.push(lines[i].trim()); i++; }
                const text = textLines.join(' ').trim();
                if (text) result.push({start,end,text});
            }
            return result.sort((a,b)=>a.start-b.start);
        }

        function renderSubtitleList() {
            subtitleList.innerHTML = '';
            subtitles.forEach((sub, idx)=>{
                const el = document.createElement('div');
                el.className = 'subtitle-item';
                const timeSpan = document.createElement('span');
                timeSpan.className = 'time-badge';
                timeSpan.textContent = formatTimeDisplay(sub.start);
                const textSpan = document.createElement('span');
                textSpan.className = 'text';
                textSpan.textContent = sub.text;
                textSpan.style.fontSize = currentFontSize+'px';
                el.appendChild(timeSpan);
                el.appendChild(textSpan);
                el.addEventListener('click', ()=>seekToSubtitle(idx));
                subtitleList.appendChild(el);
                sub.element = el;
            });
            updateEmptyStates();
        }

        function updateEmptyStates() {
            emptyState.style.display = subtitles.length ? 'none' : 'block';
            noMatchState.style.display = 'none';
        }

        function filterSubtitles(query) {
            const q = query.toLowerCase().trim();
            let visibleCount=0;
            subtitles.forEach(sub=>{
                if(!sub.element) return;
                const matches = !q || sub.text.toLowerCase().includes(q);
                sub.element.classList.toggle('hidden-by-search', !matches);
                if(matches) visibleCount++;
            });
            noMatchState.style.display = (q && visibleCount===0 && subtitles.length>0) ? 'block' : 'none';
            emptyState.style.display = subtitles.length===0 ? 'block' : 'none';
        }

        searchInput.addEventListener('input', e=> filterSubtitles(e.target.value));
        searchInput.addEventListener('keydown', e=>{
            if(e.key==='Enter'){
                const q = searchInput.value.toLowerCase().trim();
                if(!q) return;
                const idx = subtitles.findIndex(sub=>sub.text.toLowerCase().includes(q));
                if(idx!==-1) seekToSubtitle(idx);
            }
        });

        // 动态视频比例
        function setVideoAspectRatio() {
            if (!video.videoWidth || !video.videoHeight) {
                // fallback
                const vs = document.querySelector('.video-section');
                if (window.innerWidth < window.innerHeight) vs.style.aspectRatio = '16 / 9';
                return;
            }
            const vs = document.querySelector('.video-section');
            if (window.innerWidth < window.innerHeight) {
                vs.style.aspectRatio = `${video.videoWidth} / ${video.videoHeight}`;
            } else {
                vs.style.aspectRatio = 'auto';
            }
        }
        video.addEventListener('loadedmetadata', setVideoAspectRatio);
        window.addEventListener('resize', ()=>{
            clearTimeout(window._resizeTimer);
            window._resizeTimer = setTimeout(setVideoAspectRatio, 150);
        });

        // 视频错误处理
        video.addEventListener('error', ()=>{
            alert('视频加载失败，请检查文件格式或重新选择。');
            video.style.display = 'none';
            document.getElementById('videoPlaceholder').style.display = 'flex';
            document.getElementById('videoControlsBar').style.display = 'none';
        });

        // 导入视频
        document.getElementById('videoFileInput').addEventListener('change', e=>{
            const file = e.target.files[0];
            if(!file) return;
            loadVideoFile(file);
        });

        function loadVideoFile(file) {
            if (video.src && video.src.startsWith('blob:')) URL.revokeObjectURL(video.src);
            currentVideoName = file.name;
            video.src = URL.createObjectURL(file);
            video.style.display = 'block';
            document.getElementById('videoPlaceholder').style.display = 'none';
            document.getElementById('videoControlsBar').style.display = 'flex';
            updatePlayPauseUI();

            subtitles = [];
            currentActiveIndex = -1;
            lastActiveIndex = -1;
            renderSubtitleList();

            const saved = safeGetItem('nail_history_' + currentVideoName);
            if (saved) {
                const onMeta = ()=>{
                    video.currentTime = parseFloat(saved)||0;
                    video.removeEventListener('loadedmetadata', onMeta);
                };
                video.addEventListener('loadedmetadata', onMeta);
            }
        }

        // 导入字幕
        document.getElementById('subtitleFileInput').addEventListener('change', e=>{
            const file = e.target.files[0];
            if(!file) return;
            loadSubtitleFile(file);
        });

        function loadSubtitleFile(file) {
            const encoding = encodingSelect.value;
            const reader = new FileReader();
            reader.onload = ev=>{
                try {
                    const decoder = new TextDecoder(encoding);
                    const content = decoder.decode(ev.target.result);
                    subtitles = parseSubtitles(content);
                    currentActiveIndex = -1;
                    lastActiveIndex = -1;
                    renderSubtitleList();
                    filterSubtitles(searchInput.value);
                } catch(ex) {
                    alert('字幕解析失败，请检查编码或文件格式。');
                }
            };
            reader.onerror = ()=> alert('字幕文件读取失败。');
            reader.readAsArrayBuffer(file);
        }

        document.getElementById('btnClearSubtitle').addEventListener('click', ()=>{
            subtitles=[];
            currentActiveIndex=-1;
            lastActiveIndex=-1;
            renderSubtitleList();
            filterSubtitles(searchInput.value);
        });

        speedSelect.addEventListener('change', ()=> video.playbackRate=parseFloat(speedSelect.value));
        volumeSlider.addEventListener('input', ()=> video.volume=volumeSlider.value);

        // 全屏并自动隐藏字幕面板
        function onFullscreenChange() {
            if (document.fullscreenElement) {
                subtitlePanel.style.display = 'none';
            } else {
                subtitlePanel.style.display = '';
            }
        }
        document.addEventListener('fullscreenchange', onFullscreenChange);
        fullscreenBtn.addEventListener('click', ()=>{
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.querySelector('.video-section').requestFullscreen().catch(()=>{});
            }
        });

        // AB循环
        function resetABLoop() {
            abLoopActive = false;
            loopStart = null;
            loopEnd = null;
            abLoopBtn.classList.remove('active-loop');
        }
        abLoopBtn.addEventListener('click', ()=>{
            if (!video.duration) return;
            if (!abLoopActive) {
                loopStart = video.currentTime;
                loopEnd = null;
                abLoopActive = true;
                abLoopBtn.classList.add('active-loop');
            } else {
                if (loopEnd === null) {
                    loopEnd = video.currentTime;
                    if (loopEnd < loopStart) [loopStart, loopEnd] = [loopEnd, loopStart];
                } else {
                    resetABLoop();
                }
            }
        });

        // 字幕偏移
        subOffsetMinus.addEventListener('click', ()=>{
            subtitleOffset = Math.round((subtitleOffset - 0.1)*10)/10;
            updateOffsetDisplay();
        });
        subOffsetPlus.addEventListener('click', ()=>{
            subtitleOffset = Math.round((subtitleOffset + 0.1)*10)/10;
            updateOffsetDisplay();
        });
        updateOffsetDisplay();

        // 字号
        function updateFontSize(delta){
            currentFontSize = Math.max(10, Math.min(24, currentFontSize+delta));
            document.querySelectorAll('.subtitle-item .text').forEach(el=> el.style.fontSize=currentFontSize+'px');
        }
        fontSizeMinus.addEventListener('click', ()=>updateFontSize(-1));
        fontSizePlus.addEventListener('click', ()=>updateFontSize(1));

        // 键盘快捷键
        document.addEventListener('keydown', e=>{
            if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
            if (e.code==='Space') {
                e.preventDefault();
                video.paused ? video.play().catch(()=>{}) : video.pause();
            } else if (e.code==='ArrowLeft') {
                e.preventDefault();
                video.currentTime = Math.max(0, video.currentTime-5);
            } else if (e.code==='ArrowRight') {
                e.preventDefault();
                video.currentTime = Math.min(video.duration||0, video.currentTime+5);
            }
        });

        // ---------- 拖拽导入 ----------
        const body = document.body;
        body.addEventListener('dragover', e=>{
            e.preventDefault();
            body.classList.add('drag-over');
        });
        body.addEventListener('dragleave', e=>{
            e.preventDefault();
            body.classList.remove('drag-over');
        });
        body.addEventListener('drop', e=>{
            e.preventDefault();
            body.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (!files.length) return;
            // 处理第一个文件
            const file = files[0];
            if (file.type.startsWith('video/')) {
                loadVideoFile(file);
            } else if (file.name.match(/\.(srt|vtt|txt)$/i)) {
                loadSubtitleFile(file);
            } else {
                alert('请拖入视频或字幕文件（srt/vtt/txt）。');
            }
        });

        updatePlayPauseUI();
        renderSubtitleList();
    })();
</script>
</body>
</html>
