<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>奶龙大学习</title>
    <style>
        /* ================= 基础布局重置 ================= */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        /* 顶部控制栏 */
        .controls { 
            margin-bottom: 15px; 
            display: flex; 
            gap: 12px; 
            flex-wrap: wrap; 
            flex-shrink: 0; 
            position: relative;
            z-index: 999; 
        }
        
        /* 透明文件上传胶囊 */
        .upload-wrapper {
            position: relative;
            display: inline-block;
            overflow: hidden;
        }

        /* 底层的精美外观按钮 */
        .visible-btn { 
            padding: 10px 20px; 
            border: none; 
            background: #0071e3; 
            color: #fff; 
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: 500;
            display: inline-block;
            text-align: center;
            pointer-events: none; 
        }
        .btn-danger { background: #ff3b30; pointer-events: auto; cursor: pointer; }
        .btn-danger:active { background: #ff453a; }

        /* 覆盖在按钮正上方的真实系统 input */
        .hidden-file-input {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            font-size: 100px; opacity: 0; cursor: pointer; z-index: 10;
        }

        /* ================= 主内容容器 ================= */
        .container { display: flex; gap: 20px; min-height: 0; flex: 1; height: calc(100% - 60px); position: relative; z-index: 1; }
        
        /* 视频区域 */
        .video-section { 
            background: #000; border-radius: 12px; overflow: hidden; 
            display: flex; flex-direction: column; justify-content: center; position: relative;
        }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; display: none; }
        video::-webkit-media-controls { display: none !important; }
        
        .placeholder { width: 100%; height: 100%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; min-height: 150px; background: #000; border-radius: 12px; }
        
        /* ================= 毛玻璃悬浮控制栏 ================= */
        .video-controls-bar {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(28, 28, 30, 0.88); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 18px; box-sizing: border-box;
            display: none; align-items: center; gap: 16px; z-index: 20; user-select: none;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        /* 播放/暂停状态按钮 */
        .play-pause-btn {
            background: none; border: none; padding: 0; margin: 0;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; outline: none;
        }
        .play-pause-btn svg { width: 18px; height: 18px; fill: #ffffff; transition: transform 0.1s ease; }
        .play-pause-btn:active svg { transform: scale(0.85); }
        
        /* 进度条触控热区（扩展物理交互边界，专门贴合 iPad 指针） */
        .progress-wrapper {
            flex: 1; height: 34px; display: flex; align-items: center; cursor: pointer;
            touch-action: none; position: relative;
            user-select: none; -webkit-user-select: none;
        }
        
        .custom-progress-container { width: 100%; height: 5px; background: rgba(255, 255, 255, 0.25); position: relative; border-radius: 3px; pointer-events: none; }
        .custom-progress-bar { height: 100%; width: 0%; background: #0071e3; border-radius: 3px; position: relative; will-change: width; }
        /* 进度条滑块 */
        .custom-progress-bar::after {
            content: ''; position: absolute; right: -8px; top: 50%; transform: translateY(-50%);
            width: 16px; height: 16px; background: #fff; border-radius: 50%; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.5); transition: transform 0.1s ease;
        }
        .progress-wrapper:active .custom-progress-bar::after { transform: translateY(-50%) scale(1.2); }

        .time-display { color: #aeaeb2; font-size: 13px; font-family: -apple-system-font, Menlo, Monaco, monospace; white-space: nowrap; user-select: none; min-width: 90px; text-align: right; }

        /* 字幕列表区域 */
        .subtitle-section { display: flex; flex-direction: column; background: #fff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 15px; box-sizing: border-box; }
        .search-bar { width: 100%; padding: 8px 12px; border: 1px solid #d2d2d7; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; font-size: 14px; flex-shrink: 0; }
        
        .subtitle-list { flex: 1; overflow-y: auto; border: 1px solid #e5e5ea; border-radius: 8px; padding: 5px; -webkit-overflow-scrolling: touch; position: relative; }
        .subtitle-item { padding: 10px; border-bottom: 1px solid #f2f2f7; cursor: pointer; display: flex; flex-direction: column; gap: 4px; border-radius: 6px; transition: background 0.2s; }
        .subtitle-item:hover { background: #f5f5f7; }
        .subtitle-item.active { background: #e8f2ff; color: #0066cc; font-weight: bold; }
        .time-badge { color: #86868b; font-size: 11px; white-space: nowrap; align-self: flex-start; }
        .text { font-size: 13px; line-height: 1.4; word-break: break-all; }
        
        .hidden-by-search { display: none !important; }

        /* 响应式布局 */
        @media (orientation: landscape) {
            .container { flex-direction: row; }
            .video-section { flex: 3; height: 100%; }
            .subtitle-section { flex: 1; height: 100%; min-width: 260px; }
        }
        @media (orientation: portrait) {
            .container { flex-direction: column; }
            .video-section { width: 100%; aspect-ratio: 16 / 9; flex-shrink: 0; }
            .subtitle-section { flex: 1; min-height: 0; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="upload-wrapper">
            <div class="visible-btn">导入新视频</div>
            <input type="file" id="videoFileInput" accept="video/*" class="hidden-file-input">
        </div>
        
        <div class="upload-wrapper">
            <div class="visible-btn">导入新字幕</div>
            <input type="file" id="subtitleFileInput" accept=".srt,.vtt,.txt" class="hidden-file-input">
        </div>
        
        <button id="btnClearSubtitle" class="visible-btn btn-danger">清空字幕</button>
    </div>

    <div class="container">
        <div class="video-section">
            <div id="videoPlaceholder" class="placeholder">请导入视频</div>
            <video id="localVideo" playsinline webkit-playsinline></video> 
            
            <div id="videoControlsBar" class="video-controls-bar">
                <button id="playPauseBtn" class="play-pause-btn" aria-label="播放/暂停">
                    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>

                <div id="progressWrapper" class="progress-wrapper">
                    <div id="progressContainer" class="custom-progress-container">
                        <div id="progressBar" class="custom-progress-bar"></div>
                    </div>
                </div>
                <div id="timeDisplay" class="time-display">00:00 / 00:00</div>
            </div>
        </div>
        
        <div class="subtitle-section">
            <input type="text" id="subtitleSearch" class="search-bar" placeholder="搜索字幕...">
            <div id="subtitleList" class="subtitle-list">
                <div id="emptySubtitleState" style="text-align: center; color: #86868b; padding-top: 40px;">暂无字幕</div>
            </div>
        </div>
    </div>

    <script>
        let subtitles = [];
        let currentActiveIndex = -1;
        let lastActiveIndex = -1; 
        let currentVideoName = ''; 
        let isWaitingForPad = false; 
        
        // 核心状态机变量
        let isDragging = false;       
        let UISelectedTime = 0;       

        const video = document.getElementById('localVideo');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');
        const progressContainer = document.getElementById('progressContainer');
        const progressWrapper = document.getElementById('progressWrapper');

        function formatTimeDisplay(seconds) {
            if (isNaN(seconds)) return '00:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // ================= 播放/暂停 核心状态同步 =================
        function updatePlayPauseUI() {
            if (video.paused) {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            } else {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            }
        }

        playPauseBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            if (video.paused) { video.play().catch(()=>{}); } else { video.pause(); }
        });

        video.addEventListener('play', updatePlayPauseUI);
        video.addEventListener('pause', updatePlayPauseUI);

        // ================= 【硬件级指针】核心进度算法 =================
        function computeTimeFromX(clientX) {
            if (!video.duration) return 0;
            const rect = progressContainer.getBoundingClientRect();
            let offsetX = clientX - rect.left;
            if (offsetX < 0) offsetX = 0;
            if (offsetX > rect.width) offsetX = rect.width;
            return (offsetX / rect.width) * video.duration;
        }

        function renderUIProgress(targetTime) {
            const dur = video.duration || 0;
            if (dur <= 0) return;
            const pct = (targetTime / dur) * 100;
            progressBar.style.width = pct + '%';
            timeDisplay.textContent = `${formatTimeDisplay(targetTime)} / ${formatTimeDisplay(dur)}`;
        }

        // 强行捕获硬件指针（强力穿透 iOS 防误触死区）
        function handlePointerDown(e) {
            if (!video.duration) return;
            isDragging = true;
            
            // 锁定当前指针，使微小滑动即便超出进度条物理边界也能全量捕获
            progressWrapper.setPointerCapture(e.pointerId);
            
            UISelectedTime = computeTimeFromX(e.clientX);
            renderUIProgress(UISelectedTime);
        }

        function handlePointerMove(e) {
            if (!isDragging) return;
            UISelectedTime = computeTimeFromX(e.clientX);
            renderUIProgress(UISelectedTime);
        }

        function handlePointerUp(e) {
            if (!isDragging) return;
            isDragging = false;
            
            // 释放指针锁定
            progressWrapper.releasePointerCapture(e.pointerId);
            
            // 最终位置强制做一次绝对校准
            UISelectedTime = computeTimeFromX(e.clientX);
            
            if (!isNaN(UISelectedTime)) {
                video.currentTime = UISelectedTime; 
                if (currentVideoName && video.duration > 0) {
                    localStorage.setItem('nail_history_' + currentVideoName, UISelectedTime.toString());
                }
            }
        }

        // 全面换装 Web Pointer API 监听管道（彻底摒弃 touch 和 mouse 事件）
        progressWrapper.addEventListener('pointerdown', handlePointerDown);
        progressWrapper.addEventListener('pointermove', handlePointerMove);
        progressWrapper.addEventListener('pointerup', handlePointerUp);
        progressWrapper.addEventListener('pointercancel', handlePointerUp);

        // 正常播放过程中的时间流逝
        video.addEventListener('timeupdate', () => {
            const ct = video.currentTime, dur = video.duration || 0;
            if (!isDragging) {
                renderUIProgress(ct);
                if (currentVideoName && dur > 0 && !isWaitingForPad) {
                    localStorage.setItem('nail_history_' + currentVideoName, ct.toString());
                }
            }
            if (isWaitingForPad) return;
            for (let i = subtitles.length - 1; i >= 0; i--) {
                if (ct >= subtitles[i].start && ct <= subtitles[i].end) {
                    if (currentActiveIndex !== i) { currentActiveIndex = i; updateSubtitleHighlight(); }
                    break;
                }
            }
        });

        // ================= 其余传统核心功能 =================
        function parseTimecode(tc) {
            const match = tc.match(/(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/);
            if (!match) return null;
            return parseInt(match[1]) * 3600 + parseInt(match[2]) * 60 + parseInt(match[3]) + parseInt(match[4]) / 1000;
        }

        function parseSubtitles(content) {
            const lines = content.split(/\r?\n/);
            const result = [];
            let i = 0;
            const isVTT = lines[0] && lines[0].trim().toUpperCase() === 'WEBVTT';
            if (isVTT) i = 1;
            while (i < lines.length) {
                while (i < lines.length && lines[i].trim() === '') i++;
                if (i >= lines.length) break;
                if (/^\d+$/.test(lines[i].trim()) && !isVTT) i++;
                const timeLine = lines[i].trim();
                const timeMatch = timeLine.match(/(\d{2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})/);
                if (!timeMatch) { i++; continue; }
                const start = parseTimecode(timeMatch[1]);
                const end = parseTimecode(timeMatch[2]);
                if (start === null || end === null) { i++; continue; }
                i++;
                const textLines = [];
                while (i < lines.length && lines[i].trim() !== '') { textLines.push(lines[i].trim()); i++; }
                const text = textLines.join(' ').trim();
                if (text) result.push({ start, end, text });
            }
            return result.sort((a, b) => a.start - b.start);
        }

        function renderSubtitleList() {
            const subtitleList = document.getElementById('subtitleList');
            subtitleList.innerHTML = '';
            subtitles.forEach((sub, idx) => {
                const el = document.createElement('div');
                el.className = 'subtitle-item';
                el.innerHTML = `<span class="time-badge">${formatTimeDisplay(sub.start)}</span><span class="text">${sub.text}</span>`;
                el.addEventListener('click', () => seekToSubtitle(idx));
                subtitleList.appendChild(el);
                sub.element = el;
            });
            document.getElementById('emptySubtitleState').style.display = subtitles.length ? 'none' : 'flex';
        }

        function seekToSubtitle(index) {
            if (index < 0 || index >= subtitles.length) return;
            const seekTime = Math.max(0, subtitles[index].start - 0.1);
            currentActiveIndex = index;
            updateSubtitleHighlight();
            if (!video.paused) video.pause();
            isWaitingForPad = true; 
            video.currentTime = seekTime;

            const onReady = () => {
                setTimeout(() => { video.play().catch(()=>{}); isWaitingForPad = false; }, 80);
                video.removeEventListener('seeked', onReady);
            };
            video.addEventListener('seeked', onReady);
        }

        function updateSubtitleHighlight() {
            if (lastActiveIndex !== -1 && subtitles[lastActiveIndex]?.element) subtitles[lastActiveIndex].element.classList.remove('active');
            if (currentActiveIndex !== -1 && subtitles[currentActiveIndex]?.element) {
                const activeEl = subtitles[currentActiveIndex].element;
                activeEl.classList.add('active');
                const container = document.getElementById('subtitleList');
                container.scrollTo({ top: activeEl.offsetTop - container.clientHeight / 2 + activeEl.clientHeight / 2, behavior: 'smooth' });
            }
            lastActiveIndex = currentActiveIndex;
        }

        document.getElementById('videoFileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            currentVideoName = file.name;
            video.src = URL.createObjectURL(file);
            video.style.display = 'block';
            document.getElementById('videoPlaceholder').style.display = 'none';
            document.getElementById('videoControlsBar').style.display = 'flex';
            updatePlayPauseUI();

            const savedTime = localStorage.getItem('nail_history_' + currentVideoName);
            if (savedTime) {
                const onMetadata = () => { video.currentTime = parseFloat(savedTime); video.removeEventListener('loadedmetadata', onMetadata); };
                video.addEventListener('loadedmetadata', onMetadata);
            }
        });

        document.getElementById('subtitleFileInput').addEventListener('change', (e) => {
            if (!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                subtitles = parseSubtitles(ev.target.result);
                currentActiveIndex = -1; lastActiveIndex = -1;
                renderSubtitleList();
            };
            reader.readAsText(e.target.files[0], 'UTF-8');
        });

        document.getElementById('btnClearSubtitle').addEventListener('click', () => { subtitles = []; renderSubtitleList(); });
        document.getElementById('subtitleSearch').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase().trim();
            subtitles.forEach(sub => { if (sub.element) sub.element.classList.toggle('hidden-by-search', q && !sub.text.toLowerCase().includes(q)); });
        });

        video.addEventListener('click', () => video.paused ? video.play().catch(()=>{}) : video.pause());
    </script>
</body>
</html>
