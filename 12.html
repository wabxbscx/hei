<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nail</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --accent: #fb7299;
            --text: #e0e0e0;
            --border: #2a2a45;
            --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; background: var(--surface);
            border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .header span { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
        .btn {
            padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border);
            background: #222240; color: var(--text); font-size: 0.85rem;
            cursor: pointer; margin-left: 8px;
        }
        .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }

        .video-area {
            flex: 1; background: #000; display: flex;
            align-items: center; justify-content: center;
        }
        video, iframe { width: 100%; height: 100%; border: none; object-fit: contain; }

        .subtitle-panel {
            height: 40vh; background: var(--surface);
            display: flex; flex-direction: column;
            border-top: 1px solid var(--border);
        }
        .search-bar { padding: 10px; border-bottom: 1px solid var(--border); }
        .search-bar input {
            width: 100%; padding: 10px; border-radius: 6px;
            border: 1px solid var(--border); background: #0f0f1a;
            color: var(--text); font-size: 0.9rem; outline: none;
        }
        .list { flex: 1; overflow-y: auto; padding: 6px; }
        .sub-item {
            display: flex; gap: 10px; padding: 10px; margin: 2px 0;
            border-radius: 6px; cursor: pointer;
        }
        .sub-item.active { background: var(--accent); color: #fff; }
        .sub-time {
            font-family: monospace; color: var(--accent);
            font-size: 0.75rem; min-width: 48px;
            background: #fb729915; padding: 3px 6px; border-radius: 4px;
        }
        .sub-item.active .sub-time { background: #fff3; color: #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <span>nail</span>
        <div>
            <button class="btn btn-accent" id="btnBili">📺 B站视频</button>
            <button class="btn" id="btnLocal">📹 本地视频</button>
            <button class="btn" id="btnSub">📝 导入字幕</button>
        </div>
    </div>

    <div class="video-area">
        <video id="video" style="display:none;" controls playsinline></video>
        <iframe id="biliFrame" style="display:none;" allow="autoplay; fullscreen" allowfullscreen></iframe>
        <div id="placeholder" style="color:#555;text-align:center;">🎬<br>选择视频源开始</div>
    </div>

    <div class="subtitle-panel">
        <div class="search-bar">
            <input type="text" id="search" placeholder="🔍 搜索字幕..." oninput="filterSubs()">
        </div>
        <div class="list" id="subList">
            <div style="text-align:center;color:#555;padding:30px;">暂无字幕</div>
        </div>
    </div>

    <input type="file" id="videoInput" accept="video/*" style="display:none">
    <input type="file" id="subInput" accept=".srt,.vtt,.txt" style="display:none">

    <script>
        let subtitles = [];
        let mode = null;

        function extractBV(input) {
            const match = input.trim().match(/(BV[a-zA-Z0-9]{10})/);
            return match ? match[1] : null;
        }

        // ========== B站视频（不调API，直接iframe） ==========
        document.getElementById('btnBili').addEventListener('click', () => {
            const input = prompt('请输入B站视频链接或BV号：');
            if (!input) return;
            const bv = extractBV(input);
            if (!bv) { alert('无效的BV号'); return; }

            mode = 'bilibili';
            document.getElementById('video').style.display = 'none';
            document.getElementById('placeholder').style.display = 'none';
            const iframe = document.getElementById('biliFrame');
            // 直接用 BV 号，B站播放器会自动解析
            iframe.src = `https://player.bilibili.com/player.html?bvid=${bv}&page=1&high_quality=1&autoplay=0`;
            iframe.style.display = 'block';
        });

        // ========== 本地视频 ==========
        document.getElementById('btnLocal').addEventListener('click', () => {
            document.getElementById('videoInput').click();
        });
        document.getElementById('videoInput').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            mode = 'local';
            document.getElementById('biliFrame').style.display = 'none';
            document.getElementById('placeholder').style.display = 'none';
            const video = document.getElementById('video');
            video.src = URL.createObjectURL(file);
            video.style.display = 'block';
            e.target.value = '';
        });

        // ========== 字幕 ==========
        function parseSRT(text) {
            const lines = text.split(/\r?\n/);
            const result = [];
            let i = 0;
            if (lines[0]?.trim() === 'WEBVTT') i = 1;
            while (i < lines.length) {
                while (i < lines.length && !lines[i].trim()) i++;
                if (i >= lines.length) break;
                if (/^\d+$/.test(lines[i].trim())) i++;
                if (i >= lines.length) break;
                const m = lines[i].match(/(\d{2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})/);
                if (!m) { i++; continue; }
                const start = parseTime(m[1]), end = parseTime(m[2]);
                i++;
                const texts = [];
                while (i < lines.length && lines[i].trim()) texts.push(lines[i++].trim());
                const content = texts.join(' ').replace(/<[^>]*>/g, '').trim();
                if (content) result.push({ start, end, text: content });
            }
            return result;
        }

        function parseTime(tc) {
            const m = tc.match(/(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/);
            return m ? parseInt(m[1])*3600 + parseInt(m[2])*60 + parseInt(m[3]) + parseInt(m[4])/1000 : null;
        }

        function render() {
            const c = document.getElementById('subList');
            c.innerHTML = '';
            subtitles.forEach((s, idx) => {
                const d = document.createElement('div');
                d.className = 'sub-item';
                d.innerHTML = `<span class="sub-time">${fmt(s.start)}</span><span>${s.text}</span>`;
                d.addEventListener('click', () => {
                    document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
                    d.classList.add('active');
                    const t = Math.max(0, s.start - 0.1);
                    if (mode === 'local') {
                        document.getElementById('video').currentTime = t;
                    } else if (mode === 'bilibili') {
                        const iframe = document.getElementById('biliFrame');
                        iframe.contentWindow?.postMessage(JSON.stringify({type:'seek',data:{time:t}}), '*');
                    }
                });
                c.appendChild(d);
            });
        }

        function fmt(s) {
            const m = Math.floor(s/60), sec = Math.floor(s%60);
            return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
        }

        function filterSubs() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.sub-item').forEach(el => {
                el.classList.toggle('hidden', !el.textContent.toLowerCase().includes(q));
            });
        }

        document.getElementById('btnSub').addEventListener('click', () => {
            document.getElementById('subInput').click();
        });
        document.getElementById('subInput').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                subtitles = parseSRT(ev.target.result);
                if (subtitles.length) render();
            };
            reader.readAsText(file);
            e.target.value = '';
        });
    </script>
</body>
</html>
