<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>nail</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: #000; color: #fff;
            margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column;
        }
        video { width: 100%; flex: 1; background: #000; }
        #subList {
            flex: 1; overflow-y: auto; background: #111;
            padding: 5px; font-size: 14px;
        }
        .sub {
            padding: 8px; border-bottom: 1px solid #222;
            cursor: pointer; display: flex; gap: 10px;
        }
        .sub:active { background: #333; }
        .sub.active { background: #fb7299; color: #fff; }
        .time {
            color: #fb7299; font-family: monospace;
            min-width: 45px; font-size: 12px;
        }
        .btn {
            padding: 10px; background: #fb7299; color: #fff;
            border: none; font-size: 16px; cursor: pointer;
        }
        .btn-row { display: flex; }
        .btn-row .btn { flex: 1; }
        .btn-gray { background: #333; }
    </style>
</head>
<body>

    <video id="video" controls playsinline></video>

    <div class="btn-row">
        <button class="btn" onclick="document.getElementById('videoInput').click()">📹 视频</button>
        <button class="btn btn-gray" onclick="document.getElementById('subInput').click()">📝 字幕</button>
        <button class="btn btn-gray" onclick="clearSubs()">🗑️</button>
    </div>

    <div id="subList"></div>

    <input type="file" id="videoInput" accept="video/*" style="display:none">
    <input type="file" id="subInput" accept=".srt,.vtt" style="display:none">

    <script>
        const video = document.getElementById('video');
        let subs = [];
        let currentActiveIndex = -1;
        let currentVideoURL = null;

        // 加载视频（修复：释放旧 URL）
        document.getElementById('videoInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 释放之前的 ObjectURL
            if (currentVideoURL) {
                URL.revokeObjectURL(currentVideoURL);
            }
            currentVideoURL = URL.createObjectURL(file);
            video.src = currentVideoURL;

            // 恢复进度
            const saved = localStorage.getItem('time_' + file.name);
            if (saved) {
                video.onloadedmetadata = function() {
                    video.currentTime = parseFloat(saved);
                };
            }
        };

        // 加载字幕
        document.getElementById('subInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                subs = parseSRT(ev.target.result);
                renderSubs();
            };
            reader.readAsText(file);
        };

        // SRT 解析
        function parseSRT(txt) {
            const lines = txt.split(/\r?\n/);
            const res = [];
            for (let i = 0; i < lines.length; i++) {
                const m = lines[i].match(/(\d{2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})/);
                if (!m) continue;
                const start = parseTime(m[1]), end = parseTime(m[2]);
                i++;
                let text = '';
                while (i < lines.length && lines[i].trim()) text += lines[i++].trim() + ' ';
                if (text) res.push({ start, end, text: text.trim() });
            }
            return res;
        }

        function parseTime(tc) {
            const parts = tc.split(/[:,]/);
            return parseInt(parts[0])*3600 + parseInt(parts[1])*60 + parseInt(parts[2]) + parseInt(parts[3])/1000;
        }

        // 渲染字幕列表
        function renderSubs() {
            let html = '';
            subs.forEach((sub, idx) => {
                const m = Math.floor(sub.start / 60);
                const s = Math.floor(sub.start % 60);
                const timeStr = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
                html += `<div class="sub" data-index="${idx}" onclick="jump(${idx})">
                    <span class="time">${timeStr}</span>
                    <span>${sub.text}</span>
                </div>`;
            });
            document.getElementById('subList').innerHTML = html;
        }

        // ✅ 修复：等待 seek 完成后再 play，避免卡死
        function jump(idx) {
            const seekTime = subs[idx].start;
            video.pause();
            video.currentTime = seekTime;

            // 高亮处理（只更新变化的两个元素）
            if (currentActiveIndex !== -1) {
                const prev = document.querySelector(`.sub[data-index="${currentActiveIndex}"]`);
                if (prev) prev.classList.remove('active');
            }
            const curr = document.querySelector(`.sub[data-index="${idx}"]`);
            if (curr) curr.classList.add('active');
            currentActiveIndex = idx;

            // 等待 seek 完成后再播放
            video.addEventListener('seeked', function playAfterSeek() {
                video.play().catch(() => {});
                video.removeEventListener('seeked', playAfterSeek);
            }, { once: true });
        }

        function clearSubs() {
            subs = [];
            document.getElementById('subList').innerHTML = '';
            currentActiveIndex = -1;
        }

        // ✅ 进度保存（暂停时保存）
        video.addEventListener('pause', () => {
            const file = document.getElementById('videoInput').files[0];
            if (file && video.currentTime) {
                localStorage.setItem('time_' + file.name, video.currentTime);
            }
        });

        // ✅ 精简的 timeupdate：只高亮当前字幕，只更新变化的元素
        video.addEventListener('timeupdate', () => {
            if (!subs.length) return;
            const ct = video.currentTime;
            let newIdx = -1;
            for (let i = subs.length - 1; i >= 0; i--) {
                if (ct >= subs[i].start && ct <= subs[i].end) {
                    newIdx = i;
                    break;
                }
            }
            if (newIdx !== currentActiveIndex) {
                if (currentActiveIndex !== -1) {
                    const prevEl = document.querySelector(`.sub[data-index="${currentActiveIndex}"]`);
                    if (prevEl) prevEl.classList.remove('active');
                }
                if (newIdx !== -1) {
                    const newEl = document.querySelector(`.sub[data-index="${newIdx}"]`);
                    if (newEl) newEl.classList.add('active');
                }
                currentActiveIndex = newIdx;
            }
        });
    </script>
</body>
</html>
