<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nail</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface-light: #222240;
            --accent: #fb7299;
            --accent-glow: #fb729955;
            --text: #e0e0e0;
            --text-secondary: #999;
            --text-muted: #666;
            --border: #2a2a45;
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
        }

        .app-container { display: flex; flex-direction: column; height: 100vh; max-width: 1600px; margin: 0 auto; }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
            flex-shrink: 0; gap: 12px; flex-wrap: wrap;
        }
        .header-brand { display: flex; align-items: center; gap: 10px; font-size: 1.15rem; font-weight: 700; color: var(--accent); }
        .header-brand .icon {
            width: 34px; height: 34px; border-radius: 8px; background: var(--accent);
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #fff;
        }
        .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px;
            border-radius: var(--radius-sm); border: 1px solid var(--border);
            background: var(--surface-light); color: var(--text); cursor: pointer;
            font-size: 0.9rem; font-weight: 500; white-space: nowrap;
            transition: all var(--transition); outline: none; font-family: inherit;
        }
        .btn:hover { background: #2e2e4a; border-color: #444; }
        .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
        .btn-accent:hover { background: #ff8aaf; box-shadow: 0 4px 20px var(--accent-glow); }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .btn-ghost { background: transparent; border-color: transparent; color: var(--text-secondary); }

        .main-content { display: flex; flex: 1; overflow: hidden; }

        .video-section {
            flex: 7; display: flex; flex-direction: column; background: #000;
            position: relative; border-right: 1px solid var(--border);
        }
        .video-container {
            flex: 1; position: relative; display: flex; align-items: center;
            justify-content: center; background: #000; overflow: hidden;
        }
        .video-container video { width: 100%; height: 100%; border: none; outline: none; object-fit: contain; }
        .video-placeholder {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 16px; color: var(--text-muted); text-align: center; padding: 40px;
        }
        .video-placeholder .placeholder-icon { font-size: 4rem; opacity: 0.5; }
        .video-placeholder p { font-size: 0.95rem; line-height: 1.6; }

        .subtitle-section {
            flex: 3; display: flex; flex-direction: column; background: var(--surface);
            min-width: 300px; max-width: 460px; overflow: hidden;
        }
        .subtitle-header { padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .subtitle-header input {
            width: 100%; padding: 10px 14px 10px 38px; border-radius: var(--radius-sm);
            border: 1px solid var(--border); background: var(--surface-light);
            color: var(--text); font-size: 0.85rem; outline: none; font-family: inherit;
        }
        .subtitle-header input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .subtitle-list { flex: 1; overflow-y: auto; padding: 8px 10px; }

        .subtitle-item {
            display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px;
            margin: 3px 4px; border-radius: var(--radius-sm); cursor: pointer;
            transition: all var(--transition); border: 1.5px solid transparent;
            scroll-margin: 60px;
        }
        .subtitle-item:hover { background: var(--surface-light); border-color: #ffffff15; }
        .subtitle-item.active { background: #fb729918; border-color: var(--accent); }
        .subtitle-item .time-badge {
            flex-shrink: 0; font-size: 0.7rem; font-weight: 600; color: var(--accent);
            background: #fb729915; padding: 4px 8px; border-radius: 4px;
            font-family: monospace; min-width: 60px; text-align: center;
        }
        .subtitle-item.active .time-badge { background: var(--accent); color: #fff; }
        .subtitle-item .text { flex: 1; font-size: 0.85rem; line-height: 1.5; word-break: break-word; }
        .subtitle-item.active .text { color: #fff; font-weight: 500; }
        .subtitle-item.hidden-by-search { display: none; }

        .empty-subtitle-state {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; color: var(--text-muted); text-align: center; padding: 30px; gap: 12px;
        }

        @media (max-width: 900px) {
            .main-content { flex-direction: column; }
            .video-section { flex: none; height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
            .subtitle-section { flex: 1; max-width: none; min-width: auto; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div class="header-brand">
                <div class="icon">▶</div>
                <span>nail</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-sm btn-accent" id="btnLoadVideo">📹 打开视频</button>
                <button class="btn btn-sm" id="btnLoadSubtitle">📝 导入字幕</button>
                <button class="btn btn-sm btn-ghost" id="btnClearSubtitle">🗑️ 清除字幕</button>
            </div>
        </header>

        <div class="main-content">
            <div class="video-section">
                <div class="video-container" id="videoContainer">
                    <div class="video-placeholder" id="videoPlaceholder">
                        <div class="placeholder-icon">🎬</div>
                        <p>点击"打开视频"选择本地视频文件</p>
                        <span style="font-size:0.8rem;opacity:0.5;">支持拖拽视频文件到此区域</span>
                    </div>
                    <video id="localVideo" style="display:none;" controls playsinline></video>
                </div>
            </div>

            <div class="subtitle-section">
                <div class="subtitle-header">
                    <input type="text" id="subtitleSearch" placeholder="🔍 搜索字幕..." />
                </div>
                <div class="subtitle-list" id="subtitleList">
                    <div class="empty-subtitle-state" id="emptySubtitleState">
                        <div>💬</div>
                        <p>尚未导入字幕</p>
                        <span style="font-size:0.75rem;opacity:0.5;">点击"导入字幕"按钮<br>或拖拽SRT/VTT文件到页面</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="videoFileInput" accept="video/*" style="display:none;" />
    <input type="file" id="subtitleFileInput" accept=".srt,.vtt,.txt" style="display:none;" />

  <script>
        let subtitles = [];
        let currentActiveIndex = -1;
        let lastActiveIndex = -1; 
        let searchQuery = '';
        let isWaitingForPad = false; 

        // 工具函数
        function formatTimeShort(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 字幕解析
        function parseTimecode(tc) {
            const match = tc.match(/(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/);
            if (!match) return null;
            return parseInt(match[1]) * 3600 + parseInt(match[2]) * 60 + parseInt(match[3]) + parseInt(match[4]) / 1000;
        }

        function parseSubtitles(content) {
            const lines = content.split(/\r?\n/);
            const result = [];
            let i = 0;
            const isVTT = lines[0] && lines[0].trim().toUpperCase() === 'WEBVTT';
            if (isVTT) i = 1;
            while (i < lines.length) {
                while (i < lines.length && lines[i].trim() === '') i++;
                if (i >= lines.length) break;
                const line1 = lines[i].trim();
                if (/^\d+$/.test(line1) && !isVTT) { i++; if (i >= lines.length) break; }
                const timeLine = lines[i].trim();
                const timeMatch = timeLine.match(/(\d{2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})/);
                if (!timeMatch) { i++; continue; }
                const start = parseTimecode(timeMatch[1]);
                const end = parseTimecode(timeMatch[2]);
                if (start === null || end === null) { i++; continue; }
                i++;
                const textLines = [];
                while (i < lines.length && lines[i].trim() !== '') { textLines.push(lines[i].trim()); i++; }
                const text = textLines.join(' ').trim();
                if (text) result.push({ start, end, text });
            }
            result.sort((a, b) => a.start - b.start);
            return result;
        }

        function loadSubtitles(arr) {
            subtitles = arr.map((item, idx) => ({ id: idx, start: item.start, end: item.end, text: item.text, element: null }));
            lastActiveIndex = -1; 
            currentActiveIndex = -1;
            isWaitingForPad = false;
            renderSubtitleList();
            updateSubtitleHighlight();
        }

        function renderSubtitleList() {
            const subtitleList = document.getElementById('subtitleList');
            subtitleList.innerHTML = '';
            subtitles.forEach((sub, idx) => {
                const el = document.createElement('div');
                el.className = 'subtitle-item';
                el.dataset.index = idx;
                el.innerHTML = `<span class="time-badge">${formatTimeShort(sub.start)}</span><span class="text">${escapeHtml(sub.text)}</span>`;
                el.addEventListener('click', () => seekToSubtitle(idx));
                subtitleList.appendChild(el);
                sub.element = el;
            });
            document.getElementById('emptySubtitleState').style.display = subtitles.length ? 'none' : 'flex';
            applySearchFilter();
        }

        function applySearchFilter() {
            const q = searchQuery.toLowerCase().trim();
            subtitles.forEach(sub => {
                if (!sub.element) return;
                sub.element.classList.toggle('hidden-by-search', q && !sub.text.toLowerCase().includes(q));
            });
        }

        function updateSubtitleHighlight() {
            if (lastActiveIndex !== -1 && subtitles[lastActiveIndex] && subtitles[lastActiveIndex].element) {
                subtitles[lastActiveIndex].element.classList.remove('active');
            }
            if (currentActiveIndex !== -1 && subtitles[currentActiveIndex] && subtitles[currentActiveIndex].element) {
                const activeEl = subtitles[currentActiveIndex].element;
                activeEl.classList.add('active');
                activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
            lastActiveIndex = currentActiveIndex;
        }

        // 跳转逻辑：保持最稳妥的先刹车再跳转
        function seekToSubtitle(index) {
            if (index < 0 || index >= subtitles.length) return;
            
            const video = document.getElementById('localVideo');
            const seekTime = Math.max(0, subtitles[index].start - 0.1);

            currentActiveIndex = index;
            updateSubtitleHighlight();

            if (!video.paused) {
                video.pause();
            }

            isWaitingForPad = true;
            video.currentTime = seekTime;

            const onReadyToPlay = () => {
                setTimeout(() => {
                    video.play().catch(() => {});
                    isWaitingForPad = false;
                }, 100);
                video.removeEventListener('seeked', onReadyToPlay);
                video.removeEventListener('canplay', onReadyToPlay);
            };

            video.addEventListener('seeked', onReadyToPlay);
            video.addEventListener('canplay', onReadyToPlay);
        }

        // 彻底删除了任何读写 localStorage 的代码
        function loadLocalVideo(file) {
            const video = document.getElementById('localVideo');
            const placeholder = document.getElementById('videoPlaceholder');
            
            video.src = URL.createObjectURL(file);
            video.style.display = 'block';
            placeholder.style.display = 'none';
        }

        // 事件监听
        document.getElementById('btnLoadVideo').addEventListener('click', () => document.getElementById('videoFileInput').click());
        document.getElementById('videoFileInput').addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) loadLocalVideo(e.target.files[0]);
            e.target.value = '';
        });

        document.getElementById('btnLoadSubtitle').addEventListener('click', () => document.getElementById('subtitleFileInput').click());
        document.getElementById('subtitleFileInput').addEventListener('change', (e) => {
            if (!e.target.files || !e.target.files[0]) return;
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const parsed = parseSubtitles(ev.target.result);
                if (parsed.length === 0) return alert('未解析到有效字幕');
                loadSubtitles(parsed);
            };
            reader.readAsText(file, 'UTF-8');
            e.target.value = '';
        });

        document.getElementById('btnClearSubtitle').addEventListener('click', () => {
            subtitles = [];
            currentActiveIndex = -1;
            lastActiveIndex = -1;
            renderSubtitleList();
            updateSubtitleHighlight();
        });

        document.getElementById('subtitleSearch').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            applySearchFilter();
        });

        document.getElementById('localVideo').addEventListener('timeupdate', () => {
            if (isWaitingForPad) return;
            const video = document.getElementById('localVideo');
            const ct = video.currentTime;

            for (let i = subtitles.length - 1; i >= 0; i--) {
                if (ct >= subtitles[i].start && ct <= subtitles[i].end) {
                    if (currentActiveIndex !== i) { 
                        currentActiveIndex = i; 
                        updateSubtitleHighlight(); 
                    }
                    return;
                }
            }
        });

        // 拖拽支持
        document.addEventListener('dragover', e => { e.preventDefault(); });
        document.addEventListener('drop', e => {
            e.preventDefault();
            const file = e.dataTransfer?.files[0];
            if (!file) return;
            const ext = file.name.split('.').pop()?.toLowerCase();
            if (['srt', 'vtt', 'txt'].includes(ext)) {
                const reader = new FileReader();
                reader.onload = ev => {
                    const parsed = parseSubtitles(ev.target.result);
                    if (parsed.length) loadSubtitles(parsed);
                };
                reader.readAsText(file, 'UTF-8');
            } else if (file.type.startsWith('video/')) {
                loadLocalVideo(file);
            }
        });

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            const video = document.getElementById('localVideo');
            if (e.code === 'Space') { e.preventDefault(); video.paused ? video.play() : video.pause(); }
            if (e.code === 'ArrowRight') { e.preventDefault(); video.currentTime = Math.min(video.duration, video.currentTime + 5); }
            if (e.code === 'ArrowLeft') { e.preventDefault(); video.currentTime = Math.max(0, video.currentTime - 5); }
        });
    </script>
</body>
</html>
